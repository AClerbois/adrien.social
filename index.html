    <style>
        :root {
            --navy:      #002244;
            --green:     #69BE28;
            --green-lt:  #8fe04a;
            --grey:      #A5ACAF;

            /* Dark theme (default) */
            --bg-1:      #001427;
            --bg-2:      #002244;
            --bg-3:      #06304f;
            --card-bg:   rgba(255, 255, 255, 0.06);
            --card-brd:  rgba(255, 255, 255, 0.12);
            --card-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
            --text:      #eef3f6;
            --text-dim:  #a5acaf;
            --link-bg:   rgba(255, 255, 255, 0.05);
            --link-brd:  rgba(255, 255, 255, 0.12);
            --accent:    var(--green);
        }

        [data-theme="light"] {
            --bg-1:      #eef2f5;
            --bg-2:      #dfe7ec;
            --bg-3:      #cfdbe4;
            --card-bg:   rgba(255, 255, 255, 0.7);
            --card-brd:  rgba(0, 34, 68, 0.1);
            --card-shadow: 0 24px 60px rgba(0, 34, 68, 0.18);
            --text:      #002244;
            --text-dim:  #5c6b78;
            --link-bg:   rgba(255, 255, 255, 0.65);
            --link-brd:  rgba(0, 34, 68, 0.12);
            --accent:    #55a017;
        }

        * { box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 18px;
            color: var(--text);
            background: var(--bg-1);
            overflow-x: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* Animated aurora background */
        .aurora {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            background: var(--bg-1);
        }
        .aurora::before,
        .aurora::after {
            content: "";
            position: absolute;
            width: 60vmax;
            height: 60vmax;
            border-radius: 50%;
            filter: blur(70px);
            opacity: 0.55;
            will-change: transform;
        }
        .aurora::before {
            top: -20%;
            left: -10%;
            background: radial-gradient(circle at center, var(--green) 0%, transparent 65%);
            animation: drift1 18s ease-in-out infinite alternate;
        }
        .aurora::after {
            bottom: -25%;
            right: -15%;
            background: radial-gradient(circle at center, var(--bg-3) 0%, transparent 65%);
            animation: drift2 22s ease-in-out infinite alternate;
        }

        @keyframes drift1 {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(12vw, 10vh) scale(1.25); }
        }
        @keyframes drift2 {
            from { transform: translate(0, 0) scale(1.1); }
            to   { transform: translate(-14vw, -8vh) scale(1); }
        }

        /* Card */
        .container {
            position: relative;
            width: 100%;
            max-width: 460px;
            padding: 40px 32px 28px;
            text-align: center;
            background: var(--card-bg);
            border: 1px solid var(--card-brd);
            border-radius: 28px;
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Avatar with glowing gradient ring */
        .avatar-wrap {
            position: relative;
            width: 132px;
            height: 132px;
            margin: 0 auto 18px;
        }
        .avatar-ring {
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--green), var(--bg-3), var(--green-lt), var(--green));
            animation: spin 6s linear infinite;
            filter: drop-shadow(0 0 14px rgba(105, 190, 40, 0.45));
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .avatar {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--bg-2);
        }
        .badge {
            position: absolute;
            right: 2px;
            bottom: 2px;
            width: 34px;
            height: 34px;
            background: var(--bg-2);
            border-radius: 50%;
            display: grid;
            place-items: center;
            border: 2px solid var(--green);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        .badge svg { width: 18px; height: 18px; }

        h1 {
            margin: 6px 0 4px;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text);
        }
        .tagline {
            margin: 0 0 8px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-dim);
        }
        .pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 26px;
        }
        .pill {
            font-size: 12px;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 999px;
            color: var(--accent);
            background: color-mix(in srgb, var(--accent) 14%, transparent);
            border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
        }

        /* Links */
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            text-decoration: none;
            color: var(--text);
            font-size: 15px;
            font-weight: 600;
            background: var(--link-bg);
            border: 1px solid var(--link-brd);
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            transition: transform 0.22s cubic-bezier(0.16, 1, 0.3, 1),
                        border-color 0.22s, background-color 0.22s, box-shadow 0.22s;
            animation: rise 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .link:nth-child(1) { animation-delay: 0.05s; }
        .link:nth-child(2) { animation-delay: 0.10s; }
        .link:nth-child(3) { animation-delay: 0.15s; }
        .link:nth-child(4) { animation-delay: 0.20s; }
        .link:nth-child(5) { animation-delay: 0.25s; }
        .link:nth-child(6) { animation-delay: 0.30s; }
        .link:nth-child(7) { animation-delay: 0.35s; }

        .link .icon {
            flex: 0 0 24px;
            width: 24px;
            height: 24px;
            display: grid;
            place-items: center;
        }
        .link .icon svg { width: 22px; height: 22px; }
        .link .label { flex: 1; text-align: left; }
        .link .chev {
            opacity: 0;
            transform: translateX(-6px);
            transition: opacity 0.22s, transform 0.22s;
            color: var(--accent);
        }
        .link:hover, .link:focus-visible {
            transform: translateY(-3px);
            border-color: color-mix(in srgb, var(--accent) 55%, transparent);
            background: color-mix(in srgb, var(--accent) 10%, var(--link-bg));
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.28);
            outline: none;
        }
        .link:hover .chev, .link:focus-visible .chev {
            opacity: 1;
            transform: translateX(0);
        }
        /* Shine sweep on hover */
        .link::after {
            content: "";
            position: absolute;
            top: 0;
            left: -120%;
            width: 60%;
            height: 100%;
            background: linear-gradient(115deg, transparent, rgba(255, 255, 255, 0.18), transparent);
            transform: skewX(-20deg);
            transition: left 0.6s ease;
        }
        .link:hover::after { left: 130%; }

        /* Partner / credential logos — on white chips so they read on any theme */
        .logos {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin: 26px 0 4px;
            padding-top: 22px;
            border-top: 1px solid var(--card-brd);
        }
        .logos img {
            height: 58px;
            width: auto;
            padding: 8px 14px;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.22);
            transition: transform 0.25s, box-shadow 0.25s;
        }
        .logos img:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.3);
        }

        footer {
            margin-top: 22px;
            font-size: 12.5px;
            color: var(--text-dim);
            text-align: center;
        }
        footer a { color: var(--accent); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        /* Theme toggle */
        .theme-toggle {
            position: fixed;
            top: 18px;
            right: 18px;
            width: 42px;
            height: 42px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            cursor: pointer;
            color: var(--text);
            background: var(--card-bg);
            border: 1px solid var(--card-brd);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: transform 0.25s, background-color 0.25s;
            z-index: 10;
        }
        .theme-toggle:hover { transform: rotate(20deg) scale(1.08); }
        .theme-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
        .theme-toggle svg { width: 20px; height: 20px; }
        .theme-toggle .moon { display: none; }
        [data-theme="dark"] .theme-toggle .sun { display: none; }
        [data-theme="dark"] .theme-toggle .moon { display: block; }

        @media (max-width: 420px) {
            .container { padding: 34px 22px 24px; }
            h1 { font-size: 23px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
        }
    </style>
</head>

    <script>
        (function () {
            var root = document.documentElement;
            var stored = localStorage.getItem('theme');
            if (stored) {
                root.setAttribute('data-theme', stored);
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
                root.setAttribute('data-theme', 'light');
            }

            var toggle = document.getElementById('themeToggle');
            toggle.addEventListener('click', function () {
                var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                root.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                document.querySelector('meta[name="theme-color"]')
                    .setAttribute('content', next === 'dark' ? '#002244' : '#eef2f5');
            });

            document.getElementById('year').textContent = new Date().getFullYear();
        })();
    </script>
